<!DOCTYPE html>
<html>
    <head>
        <title>to do app</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="index.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <header>

            <h1>Manage Your daily tasks</h1>

                   </header>
        <main>
           <div id="to-do-app">
            
            <div id="front-page">
                <button id="open-form" aria-controls="form-section"  aria-expanded="false" type="button">Add Task</button>
            </div>
        
   
            <div id="form-section" hidden>
           
                <form id="task-form">
                    <label for="task-input">Task</label>
                    <input type="text" id="task-input" placeholder="go to meeting">
                    <label for="date-input">Date</label>
                    <input type="date" id="date-input">
                    <label for="description">Description</label>
                    <textarea id="description"></textarea>
                
                
                <button id="add-task" type="submit">Add</button>
                </form>
        
            </div>
       
            <div id="task-list">

            </div>
        </div>
        </main>
        
        
        <script src="index.js"></script>
    </body>
</html>
